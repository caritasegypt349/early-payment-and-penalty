<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>النظام المحاسبي المتكامل - الإصدار النهائي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f9; padding: 20px; }
        .container { max-width: 1750px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        .date-info { text-align: center; margin-bottom: 15px; color: #2980b9; font-weight: bold; }
        textarea { width: 100%; height: 120px; padding: 12px; border: 2px solid #dfe6e9; border-radius: 8px; margin-bottom: 15px; outline: none; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-process { background-color: #3498db; color: white; }
        .btn-excel { background-color: #27ae60; color: white; }
        
        .table-container { overflow-x: auto; margin-top: 20px; max-height: 600px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1650px; }
        th, td { border: 1px solid #d1d8e0; padding: 10px; text-align: center; font-size: 13px; }
        th { background-color: #34495e; color: white; position: sticky; top: 0; z-index: 10; }
        
        .col-penalty { background-color: #fee2e2 !important; color: #b91c1c; font-weight: bold; }
        .status-eligible { color: #27ae60; font-weight: bold; background-color: #eafaf1; }
        .status-current { color: #d35400; font-weight: bold; background-color: #fff5e6; }
        .col-tasfeya { background-color: #fff9db !important; font-weight: bold; }
        
        .total-row { background-color: #f1c40f !important; font-weight: bold; color: #2c3e50; }
        .final-result-box { background-color: #2c3e50 !important; color: #ffffff !important; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>نظام إدارة الأقساط والتصفية (حسابات دقيقة + إجماليات)</h2>
    <div class="date-info" id="currentDateDisplay"></div>
    
    <textarea id="dataInput" placeholder="قم بلصق البيانات هنا..."></textarea>
    
    <div class="btn-group">
        <button class="btn-process" onclick="processAll()">تحليل البيانات وعرض الإجماليات</button>
        <button class="btn-excel" onclick="exportToExcel()">تصدير إكسيل (Excel)</button>
    </div>

    <div id="tableOutput" class="table-container"></div>
</div>

<script>
const today = new Date();
document.getElementById('currentDateDisplay').innerText = "تاريخ التقرير: " + today.toLocaleDateString('ar-EG');

function processAll() {
    const input = document.getElementById('dataInput').value.trim();
    if (!input) return;

    const lines = input.split('\n');
    let rowsData = [];
    let totals = { principal: 0, fees: 0, totalDue: 0, paid: 0, penalty: 0 };
    
    lines.forEach(line => {
        if (!line.trim() || line.includes("أصل") || line.startsWith("إجمالي")) return;
        let p = line.trim().split(/\s+/);
        if (p.length < 8) return;
        
        let dateParts = p[1].split('/');
        let instDate = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);

        let principalVal = parseFloat(p[2].replace(/,/g, '')) || 0;
        let feesVal = parseFloat(p[3].replace(/,/g, '')) || 0;
        let totalVal = parseFloat(p[4].replace(/,/g, '')) || 0;
        let paidVal = parseFloat(p[7].replace(/,/g, '')) || 0;
        let delayDays = parseInt(p[p.length - 1]) || 0;

        let penaltyPerDay = (delayDays > 0) ? (totalVal * 0.01) : 0;
        let finalPenalty = Math.min(penaltyPerDay * delayDays, feesVal);

        totals.principal += principalVal;
        totals.fees += feesVal;
        totals.totalDue += totalVal;
        totals.paid += paidVal;
        totals.penalty += finalPenalty;

        rowsData.push({
            m: p[0], date: p[1], jsDate: instDate,
            principal: principalVal, fees: feesVal, totalDue: totalVal,
            paid: paidVal, delay: delayDays, penalty: finalPenalty,
            status: p[8]
        });
    });

    let tableHtml = `<table id="resultTable">
        <thead>
            <tr>
                <th colspan="9">البيانات الأساسية والغرامات</th>
                <th colspan="5" style="background-color: #e67e22">منطقة حساب التصفية</th>
            </tr>
            <tr>
                <th>م</th><th>التاريخ</th><th>أصل</th><th>مصاريف</th><th>الإجمالي</th>
                <th>المسدد</th><th>تأخير</th><th class="col-penalty">غرامة</th><th>الحالة</th>
                <th style="background-color: #d35400">حالة السطر</th>
                <th class="col-tasfeya">الرصيد (F)</th>
                <th class="col-tasfeya">عمولة 5% (G)</th>
                <th class="col-tasfeya">المطلوب (H)</th>
                <th class="col-tasfeya">الصافي (I)</th>
            </tr>
        </thead>
        <tbody>`;

    let lastNetSettlement = 0;

    rowsData.forEach((row, index) => {
        let isSameMonth = (row.jsDate.getFullYear() === today.getFullYear() && row.jsDate.getMonth() === today.getMonth());
        let isFutureMonth = (row.jsDate > today && !isSameMonth);
        
        let decision = "سابق";
        let decisionClass = "status-not-eligible";
        if (isSameMonth) { decision = "استحقاق حالي"; decisionClass = "status-current"; }
        if (isFutureMonth) { decision = "تصفية مستقبلي"; decisionClass = "status-eligible"; }

        let F_txt = "-", G_txt = "-", H_txt = "-", I_txt = "-";

        if (isSameMonth || isFutureMonth) {
            let F = row.totalDue; 
            let sumPrincipalFuture = 0;
            for(let i = index + 1; i < rowsData.length; i++) { 
                F += rowsData[i].principal; 
                sumPrincipalFuture += rowsData[i].principal;
            }
            for(let j = 0; j < index; j++) {
                if (rowsData[j].paid < rowsData[j].totalDue) {
                    F += (rowsData[j].totalDue - rowsData[j].paid + rowsData[j].penalty);
                }
            }
            let G = Math.round(sumPrincipalFuture * 0.05);
            let H = Math.round(F + G);
            let I = Math.round(H - row.paid + row.penalty);

            F_txt = Math.round(F).toLocaleString();
            G_txt = G.toLocaleString();
            H_txt = H.toLocaleString();
            I_txt = I.toLocaleString();
            
            // تخزين آخر صافي تصفية محسوب لاستخدامه في الإجمالي
            lastNetSettlement = I;
        }

        tableHtml += `<tr>
            <td>${row.m}</td><td>${row.date}</td>
            <td>${row.principal.toLocaleString()}</td><td>${row.fees.toLocaleString()}</td><td>${row.totalDue.toLocaleString()}</td>
            <td>${row.paid.toLocaleString()}</td><td>${row.delay}</td>
            <td class="col-penalty">${row.penalty.toLocaleString()}</td><td>${row.status}</td>
            <td class="${decisionClass}">${decision}</td>
            <td class="col-tasfeya">${F_txt}</td>
            <td class="col-tasfeya">${G_txt}</td>
            <td class="col-tasfeya">${H_txt}</td>
            <td class="col-tasfeya">${I_txt}</td>
        </tr>`;
    });

    // سطر الإجماليات النهائي
    tableHtml += `
        <tr class="total-row">
            <td colspan="2">إجمالي المسحوبات</td>
            <td>${Math.round(totals.principal).toLocaleString()}</td>
            <td>${Math.round(totals.fees).toLocaleString()}</td>
            <td>${Math.round(totals.totalDue).toLocaleString()}</td>
            <td>${Math.round(totals.paid).toLocaleString()}</td>
            <td>-</td>
            <td class="col-penalty">${Math.round(totals.penalty).toLocaleString()}</td>
            <td colspan="2" style="text-align:left">إجمالي المتأخرات الفعلي:</td>
            <td colspan="4" style="text-align:center; font-size:15px; background:#fff">
                ${Math.round(totals.totalDue - totals.paid + totals.penalty).toLocaleString()} ج.م
            </td>
        </tr>
        <tr class="final-result-box">
            <td colspan="9" style="text-align:right; border:none; padding-right:30px;">
                صافي المبلغ المطلوب لتصفية القرض بالكامل (شامل عمولة الـ 5% والغرامات):
            </td>
            <td colspan="5" style="font-size:18px; color:#f1c40f; border:none;">
                ${lastNetSettlement > 0 ? lastNetSettlement.toLocaleString() + " جنيه مصري" : "لا توجد تصفية متاحة"}
            </td>
        </tr>
    </tbody></table>`;

    document.getElementById('tableOutput').innerHTML = tableHtml;
}

function exportToExcel() {
    const table = document.getElementById("resultTable");
    if (!table) return;
    const wb = XLSX.utils.table_to_book(table, { sheet: "تقرير التصفية" });
    XLSX.writeFile(wb, "Final_Full_Loan_Report.xlsx");
}
</script>

</body>
</html>
